name: Go CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  GO111MODULE: on
  GOWORK: off

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"
          cache: true

      - name: Go version
        run: go version

      - name: Go environment
        run: |
          go env GOMOD
          go env GOPATH

      - name: Download modules
        run: |
          cd "$(dirname "$(go env GOMOD)")"
          go mod download

      - name: Verify modules
        run: |
          cd "$(dirname "$(go env GOMOD)")"
          go mod verify

      - name: Check formatting
        run: |
          cd "$(dirname "$(go env GOMOD)")"
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$files"
            exit 1
          fi

      - name: Vet
        run: |
          cd "$(dirname "$(go env GOMOD)")"
          go vet ./...

      - name: Build
        run: |
          cd "$(dirname "$(go env GOMOD)")"
          go build ./...

      - name: Unit tests
        run: |
          cd "$(dirname "$(go env GOMOD)")"
          go test ./...

      - name: Integration tests
        run: |
          cd "$(dirname "$(go env GOMOD)")"
          go test -tags=integration ./test/integration/...
